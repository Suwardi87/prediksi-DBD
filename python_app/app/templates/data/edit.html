{% extends "base.html" %}
{% block title %}Edit Data Pasien{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h4>Edit Data Pasien</h4>
        <p>Perbarui data pasien</p>
    </div>
    <a href="{{ url_for('data.index') }}" class="btn btn-secondary"><i class='bx bx-arrow-back'></i> Kembali</a>
</div>

<div class="card">
    <div class="card-header"><h5><i class='bx bx-edit text-primary me-2'></i>Form Edit Pasien</h5></div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-12 col-lg-6">
                    <div class="form-group">
                        <label class="form-label">No. Rekam Medis</label>
                        <input type="text" name="no_rm" class="form-control" value="{{ pasien.no_rm or '' }}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nama Pasien <span class="text-danger">*</span></label>
                        <input type="text" name="nama_pasien" class="form-control" value="{{ pasien.nama_pasien }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Usia <span class="text-danger">*</span></label>
                        <input type="number" name="usia" class="form-control" value="{{ pasien.usia }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Jenis Kelamin</label>
                        <select name="jenis_kelamin" class="form-control form-select">
                            <option value="L" {{ 'selected' if pasien.jenis_kelamin == 'L' }}>Laki-laki</option>
                            <option value="P" {{ 'selected' if pasien.jenis_kelamin == 'P' }}>Perempuan</option>
                        </select>
                    </div>
                </div>
                <div class="col-12 col-lg-6">
                    <div class="form-group">
                        <label class="form-label">Tanggal Masuk</label>
                        <input type="date" name="tanggal_masuk" class="form-control" value="{{ pasien.tanggal_masuk.strftime('%Y-%m-%d') if pasien.tanggal_masuk else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tanggal Keluar</label>
                        <input type="date" name="tanggal_keluar" class="form-control" value="{{ pasien.tanggal_keluar.strftime('%Y-%m-%d') if pasien.tanggal_keluar else '' }}">
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-group mb-0">
                        <label class="form-label">Alamat</label>
                        <textarea name="alamat" class="form-control" rows="3">{{ pasien.alamat or '' }}</textarea>
                    </div>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class='bx bx-save'></i> Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
